<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1"
  />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="format-detection" content="telephone=yes" />
  <title>Contact — Rebecca Luo</title>

  <style>
    :root {
      --turquoise: #40e0d0;
      --pink: #ff69b4;
      --ice: #e8f9ff;
      --blush: #fff5f8;
      --text: #2d2d3a;
      --sub-text: #6b6b7a;
      --border: rgba(255, 255, 255, 0.85);
      --icon-size: 44px;
      --gap: 20px;
      --tap-min: 44px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    html {
      -webkit-text-size-adjust: 100%;
    }

    body {
      min-height: 100vh;
      min-height: -webkit-fill-available;
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "SF Pro Display",
        "Helvetica Neue", Helvetica, Arial, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: max(20px, env(safe-area-inset-top))
        max(20px, env(safe-area-inset-right))
        max(20px, env(safe-area-inset-bottom))
        max(20px, env(safe-area-inset-left));
      position: relative;
      overflow-x: hidden;
      background: linear-gradient(165deg, var(--ice) 0%, var(--blush) 45%, #f0fffd 100%);
    }

    /* Soft decorative blobs */
    body::before,
    body::after {
      content: "";
      position: fixed;
      border-radius: 50%;
      filter: blur(60px);
      opacity: 0.45;
      pointer-events: none;
      z-index: 0;
    }

    body::before {
      width: 280px;
      height: 280px;
      background: radial-gradient(circle, rgba(64, 224, 208, 0.55) 0%, transparent 70%);
      top: -80px;
      right: -60px;
    }

    body::after {
      width: 320px;
      height: 320px;
      background: radial-gradient(circle, rgba(255, 105, 180, 0.4) 0%, transparent 70%);
      bottom: -100px;
      left: -80px;
    }

    .container {
      width: 100%;
      max-width: 800px;
      text-align: center;
      position: relative;
      z-index: 1;
    }

    /* Profile header */
    .profile {
      margin-bottom: 28px;
    }

    .avatar-wrap {
      display: inline-block;
      position: relative;
      margin-bottom: 16px;
    }

    .avatar-wrap::before {
      content: "";
      position: absolute;
      inset: -8px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--turquoise), var(--pink), #ffd1e8);
      opacity: 0.35;
      animation: pulse 3s ease-in-out infinite;
    }

    @keyframes pulse {
      0%,
      100% {
        transform: scale(1);
        opacity: 0.3;
      }
      50% {
        transform: scale(1.05);
        opacity: 0.45;
      }
    }

    .avatar-ring {
      width: min(132px, 36vw);
      height: min(132px, 36vw);
      padding: 4px;
      border-radius: 50%;
      background: linear-gradient(145deg, var(--turquoise), var(--pink));
      box-shadow: 0 12px 40px rgba(255, 105, 180, 0.28), 0 6px 20px rgba(64, 224, 208, 0.2);
      position: relative;
    }

    .avatar-ring img {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      object-fit: cover;
      display: block;
      border: 3px solid #fff;
    }

    .sparkle {
      position: absolute;
      width: 22px;
      height: 22px;
      color: var(--pink);
      opacity: 0.9;
    }

    .sparkle--1 {
      top: -4px;
      right: -2px;
      transform: rotate(15deg);
    }

    .sparkle--2 {
      bottom: 8px;
      left: -8px;
      color: var(--turquoise);
      width: 18px;
      height: 18px;
    }

    .title {
      font-size: clamp(24px, 5.5vw, 32px);
      margin-bottom: 6px;
      font-weight: 800;
      letter-spacing: -0.03em;
      background: linear-gradient(120deg, #2d8a8a 0%, var(--pink) 100%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .tagline {
      font-size: 14px;
      color: var(--sub-text);
      font-weight: 500;
      letter-spacing: 0.02em;
    }

    .section-divider {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin-bottom: 22px;
      margin-top: 8px;
    }

    .section-divider span {
      font-size: 15px;
      font-weight: 600;
      color: #5a5a6b;
    }

    .section-divider::before,
    .section-divider::after {
      content: "";
      height: 2px;
      width: 48px;
      border-radius: 2px;
      background: linear-gradient(90deg, transparent, var(--turquoise), var(--pink), transparent);
      opacity: 0.85;
    }

    .subtitle {
      font-size: 15px;
      color: var(--sub-text);
      margin-bottom: 22px;
      line-height: 1.4;
    }

    .contact-grid {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      align-items: center;
      gap: var(--gap);
    }

    .contact-item {
      width: calc(50% - var(--gap) / 2);
      max-width: 160px;
      min-height: var(--tap-min);
      text-decoration: none;
      color: inherit;
      border: 1px solid rgba(255, 255, 255, 0.95);
      border-radius: 20px;
      padding: 16px 12px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.95) 0%, rgba(255, 255, 255, 0.85) 100%);
      box-shadow: 0 8px 28px rgba(100, 80, 120, 0.08), 0 2px 8px rgba(64, 224, 208, 0.06);
    }

    @media (min-width: 480px) {
      .contact-item {
        width: 150px;
      }
    }

    .contact-item:active {
      transform: scale(0.98);
    }

    @media (hover: hover) {
      .contact-item:hover {
        transform: translateY(-2px);
        box-shadow: 0 14px 36px rgba(255, 105, 180, 0.12), 0 6px 16px rgba(64, 224, 208, 0.1);
        border-color: rgba(255, 182, 213, 0.6);
      }
    }

    /* Inline SVG icons — no external font/CDN required */
    .icon {
      width: var(--icon-size);
      height: var(--icon-size);
      margin-bottom: 10px;
      flex-shrink: 0;
      display: block;
    }

    .icon svg {
      width: 100%;
      height: 100%;
      display: block;
    }

    .label {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 4px;
      line-height: 1.25;
    }

    .value {
      font-size: 13px;
      color: var(--sub-text);
      line-height: 1.35;
      word-break: break-word;
    }

    .wechat .icon {
      color: #07c160;
    }
    .whatsapp .icon {
      color: #25d366;
    }
    .linkedin .icon {
      color: #0a66c2;
    }
    .facebook .icon {
      color: #1877f2;
    }
    .email .icon {
      color: #ea4335;
    }
    .phone .icon {
      color: #1c1c1e;
    }

    .footer-note {
      margin-top: 32px;
      font-size: 12px;
      color: #9a9aa8;
      line-height: 1.5;
      padding: 0 8px;
    }
  </style>
</head>
